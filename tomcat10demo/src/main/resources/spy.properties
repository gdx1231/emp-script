# P6Spy 配置文件
# 详细配置参考: https://p6spy.readthedocs.io/en/latest/config.html

# 模块列表
modulelist=com.p6spy.engine.spy.P6SpyFactory,com.p6spy.engine.logging.P6LogFactory

# 日志格式
appender=com.p6spy.engine.spy.appender.FileLogger
# 日志文件路径
logfile=spy.log
# 日志文件格式
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=%(currentTime)|%(executionTime)ms|%(category)|connection%(connectionId)|%(sqlSingleLine)

# 日期格式
dateformat=yyyy-MM-dd HH:mm:ss

# 排除的表（正则表达式）
# exclude=SELECT.*FROM.*ewa_cfg

# 是否显示慢查询
outagedetection=true
# 慢查询阈值（秒）
outagedetectioninterval=2

# 是否启用过滤
filter=true
# 排除的类别（debug, result, resultset, batch 等）
excludecategories=info,debug,result,resultset,batch

# 是否显示实际参数值（而非 ?）
excludebinary=true
